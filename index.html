<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الثقافة والتراث</title>

<!-- خط عربي رسمي -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#d8c8a3;
color:#4b2e15;
text-align:center;
}

.header{
background:#6b4423;
padding:10px;
display:flex;
justify-content:center;
gap:15px;
}

.header img{
height:55px;
}

h1{
font-weight:900;
font-size:38px;
margin-top:25px;
}

p{
font-weight:700;
line-height:1.8;
padding:0 20px;
}

.page{display:none;padding:30px;}
.active{display:block;}

button{
display:block;
margin:12px auto;
padding:15px;
width:85%;
border:none;
border-radius:15px;
background:#6b4423;
color:white;
font-size:18px;
font-weight:700;
}

.card{
background:#f3e7cd;
margin:15px;
padding:20px;
border-radius:15px;
font-weight:700;
}

.lang button{
width:60%;
background:#8b5e34;
}

</style>
</head>

<body>

<div class="header">
<img src="https://upload.wikimedia.org/wikipedia/ar/thumb/1/14/Emblem_of_Asir_Region.svg/200px-Emblem_of_Asir_Region.svg.png">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Asir_Development_Authority_logo.png/200px-Asir_Development_Authority_logo.png">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/Saudi_Vision_2030_logo.svg/200px-Saudi_Vision_2030_logo.svg.png">
</div>

<!-- اختيار اللغة -->
<div id="lang" class="page active lang">
<h1>اختر اللغة</h1>
<button onclick="setLang('ar')">العربية</button>
<button onclick="setLang('en')">English</button>
<button onclick="setLang('fr')">Français</button>
</div>

<!-- الصفحة الرئيسية -->
<div id="home" class="page">
<h1 id="homeTitle"></h1>
<button onclick="show('gov')" id="btnGov"></button>
<button onclick="show('arch')" id="btnArch"></button>
<button onclick="show('centers')" id="btnCenters"></button>
</div>

<!-- المحافظة -->
<div id="gov" class="page">
<h1 id="govTitle"></h1>
<p id="govText"></p>
<button onclick="show('home')">⬅ رجوع</button>
</div>

<!-- المعالم الأثرية -->
<div id="arch" class="page">
<h1 id="archTitle"></h1>

<div class="card" id="jarash"></div>
<div class="card" id="sunday"></div>
<div class="card" id="hamoma"></div>

<button onclick="show('home')">⬅ رجوع</button>
</div>

<!-- المراكز -->
<div id="centers" class="page">
<h1 id="centersTitle"></h1>

<div class="card" id="shaaf"></div>
<div class="card" id="faraain"></div>
<div class="card" id="wadain"></div>

<button onclick="show('home')">⬅ رجوع</button>
</div>

<script>

function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

const data={

ar:{
homeTitle:"الثقافة والتراث",
btnGov:"محافظة أحد رفيدة",
btnArch:"المعالم الأثرية",
btnCenters:"المراكز",

govTitle:"محافظة أحد رفيدة",
govText:"تُعد محافظة أحد رفيدة من أهم محافظات منطقة عسير تاريخياً وثقافياً، حيث امتزج فيها الإرث القبلي العريق مع المظاهر الحضارية الحديثة. عُرفت المنطقة بأسواقها الشعبية ومواقعها الأثرية التي تعكس عمق التاريخ في جنوب المملكة، كما تمثل نقطة التقاء للثقافة المحلية والعادات الأصيلة التي توارثها الأهالي عبر الأجيال.",

archTitle:"المعالم الأثرية",

jarash:"مدينة جرش الأثرية: تعد من أبرز المواقع التاريخية في المنطقة، وتشير النقوش والآثار الموجودة فيها إلى حضارات قديمة استقرت في عسير منذ قرون طويلة. تتميز بموقعها الجغرافي الاستراتيجي وكانت محطة تجارية وثقافية مهمة عبر العصور.",

sunday:"سوق الأحد الشعبي: سوق تراثي يعكس روح المجتمع المحلي ويُظهر مظاهر الحياة التقليدية، حيث يجتمع الأهالي لعرض المنتجات الشعبية والحرف اليدوية والمأكولات التراثية في أجواء ثقافية أصيلة.",

hamoma:"نقوش جبل حمومة: نقوش صخرية تاريخية تحمل رموزاً ورسومات قديمة تدل على مرور حضارات مختلفة بالمنطقة، وتُعد شاهداً على العمق التاريخي والتراثي لمحافظة أحد رفيدة.",

centersTitle:"المراكز",

shaaf:"مركز الشعف — متحف شعف لجوان: يعرض الموروث الشعبي والأدوات التراثية التي استخدمها الأهالي قديماً، ويعكس تفاصيل الحياة اليومية في عسير عبر مقتنيات تاريخية نادرة.",

faraain:"مركز الفرعين — متحف الرميح التراثي: يبرز الهوية الثقافية للمنطقة من خلال عرض الملابس التقليدية والأسلحة القديمة والمجسمات التي تحكي تاريخ المجتمع المحلي.",

wadain:"مركز الوادين — سوق الجمعة الشعبي: سوق تقليدي يجمع بين التجارة والتراث، ويُعد ملتقى اجتماعياً يعكس الثقافة الشعبية والحياة الاقتصادية القديمة."

},

en:{
homeTitle:"Culture & Heritage",
btnGov:"Ahad Rafidah",
btnArch:"Archaeological Sites",
btnCenters:"Centers",
govTitle:"Ahad Rafidah",
govText:"Ahad Rafidah is one of the most historically rich governorates in Asir region, combining deep tribal heritage with modern development.",
archTitle:"Archaeological Sites",
jarash:"Jarash Ancient City — historic remains reflecting ancient civilizations.",
sunday:"Sunday Heritage Market — traditional cultural marketplace.",
hamoma:"Hamoma Mountain Inscriptions — ancient rock engravings.",
centersTitle:"Centers",
shaaf:"Al Shaaf Center — Shaaf Lajwan Museum.",
faraain:"Al Faraain Center — Al Rumaih Heritage Museum.",
wadain:"Al Wadain Center — Friday Market."
},

fr:{
homeTitle:"Culture et Patrimoine",
btnGov:"Ahad Rafidah",
btnArch:"Sites Archéologiques",
btnCenters:"Centres",
govTitle:"Ahad Rafidah",
govText:"Ahad Rafidah représente un patrimoine culturel profond dans la région d’Asir.",
archTitle:"Sites Archéologiques",
jarash:"Ville antique de Jarash.",
sunday:"Marché traditionnel du dimanche.",
hamoma:"Inscriptions du mont Hamoma.",
centersTitle:"Centres",
shaaf:"Centre Al Shaaf — Musée Shaaf Lajwan.",
faraain:"Centre Al Faraain — Musée Al Rumaih.",
wadain:"Centre Al Wadain — Marché du vendredi."
}

};

function setLang(lang){

document.getElementById("homeTitle").innerText=data[lang].homeTitle;
document.getElementById("btnGov").innerText=data[lang].btnGov;
document.getElementById("btnArch").innerText=data[lang].btnArch;
document.getElementById("btnCenters").innerText=data[lang].btnCenters;

document.getElementById("govTitle").innerText=data[lang].govTitle;
document.getElementById("govText").innerText=data[lang].govText;

document.getElementById("archTitle").innerText=data[lang].archTitle;
document.getElementById("jarash").innerText=data[lang].jarash;
document.getElementById("sunday").innerText=data[lang].sunday;
document.getElementById("hamoma").innerText=data[lang].hamoma;

document.getElementById("centersTitle").innerText=data[lang].centersTitle;
document.getElementById("shaaf").innerText=data[lang].shaaf;
document.getElementById("faraain").innerText=data[lang].faraain;
document.getElementById("wadain").innerText=data[lang].wadain;

show('home');
}

</script>

</body>
</html>
