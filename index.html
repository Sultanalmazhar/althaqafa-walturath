<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الثقافة والتراث</title>

<style>

body{
margin:0;
font-family:Tahomа;
background:#e6d3a3;
text-align:center;
}

/* ===== الهيدر الرسمي ===== */
.header{
background:#6b4423;
padding:10px;
display:flex;
justify-content:center;
gap:15px;
}
.header img{
height:55px;
}

/* ===== الصفحات ===== */
.page{display:none;padding:40px;}
.active{display:block;}

h1{
color:#5b3a1a;
font-size:32px;
}

button{
display:block;
margin:12px auto;
padding:15px;
width:85%;
border:none;
border-radius:14px;
background:#6b4423;
color:white;
font-size:18px;
cursor:pointer;
}

.langBtn{
width:60%;
background:#8a673f;
}

.card{
background:white;
padding:15px;
margin:12px auto;
width:85%;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

</style>
</head>

<body>

<!-- ===== الشعارات الرسمية ===== -->
<div class="header">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_Asir_Region.png">
<img src="https://i.imgur.com/7mKQ9kB.png">
<img src="https://i.imgur.com/N3pYQkG.png">
</div>

<!-- ===== اختيار اللغة ===== -->
<div id="lang" class="page active">
<h1>اختر اللغة</h1>
<button class="langBtn" onclick="setLang('ar')">العربية</button>
<button class="langBtn" onclick="setLang('en')">English</button>
<button class="langBtn" onclick="setLang('fr')">Français</button>
</div>

<!-- ===== الصفحة الرئيسية ===== -->
<div id="home" class="page">
<h1 id="homeTitle"></h1>
<button id="btnGov" onclick="show('gov')"></button>
<button id="btnArch" onclick="show('arch')"></button>
<button id="btnCenters" onclick="show('centers')"></button>
</div>

<!-- ===== المحافظة ===== -->
<div id="gov" class="page">
<h1 id="govTitle"></h1>
<div class="card" id="govText"></div>
<button onclick="show('home')">⬅ رجوع</button>
</div>

<!-- ===== المعالم الأثرية ===== -->
<div id="arch" class="page">
<h1 id="archTitle"></h1>
<div class="card" id="jarash"></div>
<div class="card" id="sunday"></div>
<div class="card" id="hamoma"></div>
<button onclick="show('home')">⬅ رجوع</button>
</div>

<!-- ===== المراكز ===== -->
<div id="centers" class="page">
<h1 id="centersTitle"></h1>
<div class="card" id="shaaf"></div>
<div class="card" id="faraain"></div>
<div class="card" id="wadain"></div>
<button onclick="show('home')">⬅ رجوع</button>
</div>

<script>

/* التنقل بين الصفحات */
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* ===== البيانات بثلاث لغات ===== */
const data={

ar:{
homeTitle:"الثقافة والتراث",
btnGov:"محافظة أحد رفيدة",
btnArch:"المعالم الأثرية",
btnCenters:"المراكز",

govTitle:"محافظة أحد رفيدة",
govText:"تعد محافظة أحد رفيدة من المحافظات العريقة في منطقة عسير، وتمثل عمقاً تاريخياً وثقافياً يجمع بين التراث العمراني والعادات الاجتماعية الأصيلة.",

archTitle:"المعالم الأثرية",
jarash:"مدينة جرش الأثرية: موقع تاريخي يعكس حضارات قديمة شهدتها المنطقة ويعد شاهداً على العمق الحضاري لعسير.",
sunday:"سوق الأحد الشعبي: سوق تراثي يجسد روح المجتمع المحلي ويعرض المنتجات التقليدية والحرف اليدوية.",
hamoma:"نقوش جبل حمومة: نقوش صخرية تاريخية تدل على عمق الحضارة الإنسانية في المنطقة.",

centersTitle:"المراكز",
shaaf:"مركز الشعف — متحف شعف لجوان: يعرض الموروث الشعبي والأدوات التراثية التي تعكس حياة الأهالي قديماً.",
faraain:"مركز الفرعين — متحف الرميح التراثي: يبرز الهوية الثقافية للمنطقة من خلال المقتنيات التاريخية.",
wadain:"مركز الوادين — سوق الجمعة الشعبي: سوق تقليدي يعكس الثقافة الشعبية والأنشطة التراثية."
},

en:{
homeTitle:"Culture & Heritage",
btnGov:"Ahad Rafidah Governorate",
btnArch:"Archaeological Sites",
btnCenters:"Centers",

govTitle:"Ahad Rafidah Governorate",
govText:"Ahad Rafidah represents deep heritage in Asir region combining traditional architecture and authentic culture.",

archTitle:"Archaeological Sites",
jarash:"Jarash Archaeological City: A historical site reflecting ancient civilizations.",
sunday:"Sunday Traditional Market: A popular heritage market.",
hamoma:"Mount Hamoma Inscriptions: Historic rock carvings.",

centersTitle:"Centers",
shaaf:"Al Shaaf Center – Shaaf Lajwan Museum.",
faraain:"Al Faraain Center – Al Rumaiah Heritage Museum.",
wadain:"Al Wadain Center – Friday Market."
},

fr:{
homeTitle:"Culture et Patrimoine",
btnGov:"Gouvernorat d'Ahad Rafidah",
btnArch:"Sites archéologiques",
btnCenters:"Centres",

govTitle:"Gouvernorat d'Ahad Rafidah",
govText:"Ahad Rafidah représente une profondeur patrimoniale dans la région d’Asir.",

archTitle:"Sites archéologiques",
jarash:"Ville archéologique de Jarash.",
sunday:"Marché populaire du dimanche.",
hamoma:"Inscriptions du mont Hamoma.",

centersTitle:"Centres",
shaaf:"Centre Al Shaaf — Musée Shaaf Lajwan.",
faraain:"Centre Al Faraain — Musée Al Rumaiah.",
wadain:"Centre Al Wadain — Marché du vendredi."
}

};

/* ===== تفعيل اللغة ===== */
function setLang(lang){

const d=data[lang];

document.getElementById("homeTitle").innerText=d.homeTitle;
document.getElementById("btnGov").innerText=d.btnGov;
document.getElementById("btnArch").innerText=d.btnArch;
document.getElementById("btnCenters").innerText=d.btnCenters;

document.getElementById("govTitle").innerText=d.govTitle;
document.getElementById("govText").innerText=d.govText;

document.getElementById("archTitle").innerText=d.archTitle;
document.getElementById("jarash").innerText=d.jarash;
document.getElementById("sunday").innerText=d.sunday;
document.getElementById("hamoma").innerText=d.hamoma;

document.getElementById("centersTitle").innerText=d.centersTitle;
document.getElementById("shaaf").innerText=d.shaaf;
document.getElementById("faraain").innerText=d.faraain;
document.getElementById("wadain").innerText=d.wadain;

show('home');
}

</script>

</body>
</html>
